spring:
  datasource:
    url: jdbc:mysql://localhost:3308/products_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: productadmin
    password: productpass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
