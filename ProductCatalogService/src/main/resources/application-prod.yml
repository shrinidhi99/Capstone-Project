spring:
  datasource:
    url: ${PRODUCT_DB_URL:jdbc:mysql://localhost:3308/products_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${PRODUCT_DB_USERNAME:productadmin}
    password: ${PRODUCT_DB_PASSWORD:productpass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  h2:
    console:
      enabled: false
