spring:
  application:
    name: UserService

  datasource:
    url: jdbc:mysql://localhost:3307/users_db
    username: useradmin
    password: userpass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: shrinidhi99.varna@gmail.com
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  kafka:
    bootstrap-servers: ${USER_KAFKA_SERVERS:localhost:9092}
    producer:
      client-id: UserService-producer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

jwt:
  secret: MySuperSecretKeyForJWTGenerationWhichShouldBeLongEnough
  expiration-ms: 900000 # 15 min in milliseconds
