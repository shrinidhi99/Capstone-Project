spring:
  application:
    name: UserService-Test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    open-in-view: false

  h2:
    console:
      enabled: true

server:
  port: 0  # Random available port for tests

springdoc:
  swagger-ui:
    path: /test-swagger-ui
  api-docs:
    path: /test/v3/api-docs

jwt:
  secret: TestSecretKeyForJWTGenerationInTestEnvironmentWhichIsLongEnough
  expiration-ms: 300000  # 5 min for faster test execution

# Additional test-specific properties
logging:
  level:
    com.ecommerce.userservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG